<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Last Call RP — Rules</title>
  <meta name="description" content="Official rules and guidelines for Last Call RP — Los Santos' most serious FiveM roleplay community.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Barlow+Condensed:wght@300;400;500;600&family=Barlow:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-base:      #060403;
      --bg-surface:   #0c0906;
      --bg-card:      #161009;
      --bg-hover:     #1e160d;
      --border-dim:   rgba(180, 120, 40, 0.10);
      --border-mid:   rgba(180, 120, 40, 0.22);
      --border-accent:rgba(200, 140, 50, 0.45);
      --gold:         #c8821a;
      --gold-light:   #e8b86d;
      --gold-pale:    rgba(200, 130, 26, 0.10);
      --text-primary: #ede0c4;
      --text-secondary:#9a8a72;
      --text-muted:   #3e3428;
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-ui:      'Barlow Condensed', sans-serif;
      --font-body:    'Barlow', sans-serif;
      --nav-h:        56px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-weight: 300;
      line-height: 1.7;
      min-height: 100vh;
    }

    /* ── NAV ─────────────────────────────────────────────────── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2.5rem;
      height: var(--nav-h);
      background: rgba(6, 4, 3, 0.94);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border-dim);
    }

    .nav-logo {
      font-family: var(--font-ui);
      font-size: 17px;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--gold-light);
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 2rem;
      list-style: none;
    }

    .nav-links a {
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--gold-light); }

    .btn-discord-nav {
      font-family: var(--font-ui) !important;
      font-size: 11px !important;
      font-weight: 600 !important;
      letter-spacing: 0.12em !important;
      text-transform: uppercase !important;
      color: var(--bg-base) !important;
      background: var(--gold) !important;
      padding: 7px 18px !important;
      border-radius: 2px;
      text-decoration: none;
      transition: background 0.2s !important;
    }
    .btn-discord-nav:hover { background: var(--gold-light) !important; }

    /* ── HERO ────────────────────────────────────────────────── */
    .hero {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 110px 2rem 90px;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 90% 70% at 50% 30%, rgba(130, 60, 8, 0.14) 0%, transparent 65%),
        radial-gradient(ellipse 60% 40% at 50% 80%, rgba(80, 30, 0, 0.08) 0%, transparent 60%);
      pointer-events: none;
    }

    .hero-rule {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .hero-rule::before,
    .hero-rule::after {
      content: '';
      width: 40px;
      height: 1px;
      background: var(--border-accent);
    }

    .hero-eyebrow {
      font-family: var(--font-ui);
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .hero-title {
      font-family: var(--font-display);
      font-size: clamp(72px, 11vw, 130px);
      font-weight: 700;
      line-height: 0.88;
      letter-spacing: -0.01em;
      color: var(--text-primary);
      position: relative;
      z-index: 1;
    }

    .hero-sub {
      font-family: var(--font-display);
      font-size: clamp(18px, 2.5vw, 28px);
      font-weight: 400;
      font-style: italic;
      color: var(--gold-light);
      opacity: 0.75;
      margin-top: 0.3em;
    }

    .hero-divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 2.5rem auto;
    }
    .hero-divider::before,
    .hero-divider::after {
      content: '';
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold));
    }
    .hero-divider::after { transform: scaleX(-1); }
    .hero-divider-gem {
      width: 6px;
      height: 6px;
      background: var(--gold);
      transform: rotate(45deg);
    }

    .hero-desc {
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 300;
      color: var(--text-secondary);
      max-width: 460px;
      margin: 0 auto 2.5rem;
      line-height: 1.9;
    }

    .btn-discord-hero {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--bg-base);
      background: var(--gold);
      padding: 14px 34px;
      text-decoration: none;
      border-radius: 2px;
      transition: background 0.2s, transform 0.15s;
      position: relative;
      z-index: 1;
    }
    .btn-discord-hero:hover {
      background: var(--gold-light);
      transform: translateY(-1px);
    }
    .btn-discord-hero svg { flex-shrink: 0; }

    /* ── RULES SECTION ───────────────────────────────────────── */
    .rules-outer {
      border-top: 1px solid var(--border-dim);
    }

    .rules-wrapper {
      display: grid;
      grid-template-columns: 220px 1fr;
      max-width: 1080px;
      margin: 0 auto;
      padding: 4rem 2.5rem 6rem;
      gap: 4rem;
      align-items: start;
    }

    /* ── SIDEBAR ─────────────────────────────────────────────── */
    .rules-sidebar {
      position: sticky;
      top: calc(var(--nav-h) + 1.5rem);
    }

    .sidebar-heading {
      font-family: var(--font-ui);
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
      padding-left: 14px;
    }

    .sidebar-nav { list-style: none; }

    .sidebar-nav li a {
      display: block;
      font-family: var(--font-ui);
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.04em;
      color: var(--text-secondary);
      text-decoration: none;
      padding: 8px 14px;
      border-left: 1px solid var(--border-dim);
      margin-bottom: 2px;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
      border-radius: 0 2px 2px 0;
    }
    .sidebar-nav li a:hover {
      color: var(--gold-light);
      border-left-color: var(--border-mid);
      background: var(--gold-pale);
    }
    .sidebar-nav li a.active {
      color: var(--gold-light);
      border-left-color: var(--gold);
      background: var(--gold-pale);
    }

    /* ── CONTENT ─────────────────────────────────────────────── */
    .rules-content { min-height: 500px; }

    .rules-section { display: none; }
    .rules-section.active {
      display: block;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .section-header {
      border-bottom: 1px solid var(--border-dim);
      padding-bottom: 1.5rem;
      margin-bottom: 2.5rem;
    }

    .section-tag {
      display: block;
      font-family: var(--font-ui);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.4rem;
    }

    .section-title {
      font-family: var(--font-display);
      font-size: 46px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1;
    }

    /* Google Docs content — re-skinned */
    .doc-body {
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 300;
      color: var(--text-secondary);
      line-height: 1.9;
    }
    .doc-body * { font-family: inherit; color: inherit; background: none !important; }
    .doc-body h1 {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 600;
      color: var(--text-primary);
      margin: 2.5rem 0 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border-dim);
      line-height: 1.2;
    }
    .doc-body h2 {
      font-family: var(--font-display);
      font-size: 21px;
      font-weight: 600;
      color: var(--gold-light);
      margin: 2rem 0 0.6rem;
      line-height: 1.2;
    }
    .doc-body h3 {
      font-family: var(--font-ui);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-primary);
      margin: 1.5rem 0 0.5rem;
    }
    .doc-body h4, .doc-body h5, .doc-body h6 {
      font-family: var(--font-ui);
      font-size: 13px;
      font-weight: 400;
      color: var(--text-secondary);
      margin: 1rem 0 0.4rem;
      letter-spacing: 0.06em;
    }
    .doc-body p { margin-bottom: 0.9rem; }
    .doc-body ul, .doc-body ol {
      padding-left: 1.4rem;
      margin-bottom: 1rem;
    }
    .doc-body li { margin-bottom: 0.35rem; }
    .doc-body li::marker { color: var(--gold); }
    .doc-body strong, .doc-body b { font-weight: 500; color: var(--text-primary); }
    .doc-body em, .doc-body i { font-style: italic; }
    .doc-body a { color: var(--gold); text-decoration: none; }
    .doc-body a:hover { color: var(--gold-light); text-decoration: underline; }
    .doc-body hr {
      border: none;
      border-top: 1px solid var(--border-dim);
      margin: 2rem 0;
    }
    .doc-body table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 1.5rem;
      font-size: 14px;
    }
    .doc-body th {
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gold);
      text-align: left;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border-mid);
    }
    .doc-body td {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border-dim);
      color: var(--text-secondary);
    }
    .doc-body blockquote {
      border-left: 2px solid var(--gold);
      margin: 1.5rem 0;
      padding: 0.5rem 1.2rem;
      color: var(--text-secondary);
      font-style: italic;
    }

    /* Loading + error states */
    .doc-loading {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-muted);
      font-family: var(--font-ui);
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 4rem 0;
    }
    .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--gold);
      animation: blink 1.4s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.15; transform: scale(0.75); }
      40% { opacity: 1; transform: scale(1); }
    }

    .doc-error {
      padding: 2rem 0;
      font-family: var(--font-ui);
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .doc-error span { color: var(--gold); }

    /* ── FOOTER ──────────────────────────────────────────────── */
    footer {
      border-top: 1px solid var(--border-dim);
      padding: 3rem 2.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .footer-logo {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 600;
      color: var(--text-muted);
    }

    .footer-text {
      font-family: var(--font-ui);
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* ── RESPONSIVE ──────────────────────────────────────────── */
    @media (max-width: 720px) {
      nav { padding: 0 1.25rem; }
      .nav-links li:not(:last-child) { display: none; }
      .hero { padding: 80px 1.5rem 60px; }
      .rules-wrapper {
        grid-template-columns: 1fr;
        padding: 2rem 1.5rem 4rem;
        gap: 2rem;
      }
      .rules-sidebar { position: static; }
      .sidebar-nav { display: flex; flex-wrap: wrap; gap: 0.4rem; }
      .sidebar-nav li a {
        border-left: none;
        border: 1px solid var(--border-dim);
        border-radius: 2px;
        padding: 5px 12px;
        font-size: 12px;
      }
      .sidebar-nav li a.active {
        border-color: var(--gold);
        background: var(--gold-pale);
      }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="/" class="nav-logo">Last Call RP</a>
  <ul class="nav-links">
    <li><a href="#rules">Rules</a></li>
    <li><a href="#" class="btn-discord-nav" id="discord-nav">Join Discord</a></li>
  </ul>
</nav>

<!-- HERO -->
<section class="hero" id="home">
  <div class="hero-rule">
    <span class="hero-eyebrow">FiveM · Los Santos · Serious Roleplay</span>
  </div>
  <h1 class="hero-title">Last Call</h1>
  <p class="hero-sub">— Rules &amp; Guidelines —</p>
  <div class="hero-divider"><div class="hero-divider-gem"></div></div>
  <p class="hero-desc">
    Read and understand all rules before joining. Ignorance of the rules is not an excuse.
  </p>
  <a href="#" class="btn-discord-hero" id="discord-hero">
    <svg width="18" height="14" viewBox="0 0 71 55" fill="currentColor" aria-hidden="true">
      <path d="M60.1 4.9A58.5 58.5 0 0 0 45.7.5a.2.2 0 0 0-.2.1 40.7 40.7 0 0 0-1.8 3.7 54 54 0 0 0-16.2 0A37.6 37.6 0 0 0 25.7.6a.2.2 0 0 0-.2-.1A58.3 58.3 0 0 0 11.1 4.9a.2.2 0 0 0-.1.1C1.6 18.7-.9 32.2.3 45.5a.2.2 0 0 0 .1.2 58.8 58.8 0 0 0 17.7 9 .2.2 0 0 0 .2-.1 42 42 0 0 0 3.6-5.9.2.2 0 0 0-.1-.3 38.7 38.7 0 0 1-5.5-2.6.2.2 0 0 1 0-.4c.4-.3.7-.6 1.1-.9a.2.2 0 0 1 .2 0c11.5 5.2 24 5.2 35.4 0a.2.2 0 0 1 .2 0c.4.3.7.6 1.1.9a.2.2 0 0 1 0 .4 36 36 0 0 1-5.5 2.6.2.2 0 0 0-.1.3 47 47 0 0 0 3.6 5.9.2.2 0 0 0 .2.1 58.7 58.7 0 0 0 17.8-9 .2.2 0 0 0 .1-.2c1.4-15.2-2.4-28.5-10-40.5a.2.2 0 0 0-.1-.1ZM23.7 37.8c-3.5 0-6.4-3.2-6.4-7.2s2.8-7.2 6.4-7.2c3.6 0 6.5 3.3 6.4 7.2 0 4-2.9 7.2-6.4 7.2Zm23.7 0c-3.5 0-6.4-3.2-6.4-7.2s2.8-7.2 6.4-7.2c3.6 0 6.5 3.3 6.4 7.2 0 4-2.8 7.2-6.4 7.2Z"/>
    </svg>
    Join Our Discord
  </a>
</section>

<!-- RULES -->
<div class="rules-outer" id="rules">
  <div class="rules-wrapper">
    <aside class="rules-sidebar">
      <p class="sidebar-heading">Sections</p>
      <ul class="sidebar-nav" id="sidebar-nav"></ul>
    </aside>
    <main class="rules-content" id="rules-content"></main>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <p class="footer-logo">Last Call RP</p>
  <p class="footer-text">FiveM &bull; Los Santos &bull; All rights reserved</p>
</footer>

<script>
  (async () => {
    // Load config
    let CONFIG;
    try {
      const res = await fetch('config.json');
      CONFIG = await res.json();
    } catch (e) {
      console.error('Could not load config.json', e);
      return;
    }

    // Inject Discord URLs
    document.getElementById('discord-nav').href  = CONFIG.discordUrl;
    document.getElementById('discord-hero').href = CONFIG.discordUrl;

    const sidebarNav  = document.getElementById('sidebar-nav');
    const rulesContent = document.getElementById('rules-content');
    const cache = {};

    // Build sidebar + content shells from config
    CONFIG.sections.forEach((sec, i) => {
      // Sidebar link
      const li = document.createElement('li');
      const a  = document.createElement('a');
      a.href      = `#${sec.id}`;
      a.textContent = sec.title;
      a.dataset.id  = sec.id;
      if (i === 0) a.classList.add('active');
      li.appendChild(a);
      sidebarNav.appendChild(li);

      // Content shell
      const div = document.createElement('div');
      div.className = 'rules-section' + (i === 0 ? ' active' : '');
      div.id = `section-${sec.id}`;
      div.innerHTML = `
        <div class="section-header">
          <span class="section-tag">${sec.tag}</span>
          <h2 class="section-title">${sec.title}</h2>
        </div>
        <div class="doc-body" id="doc-${sec.id}">
          <div class="doc-loading">
            <span class="dot"></span><span class="dot"></span><span class="dot"></span>
            <span>Loading rules...</span>
          </div>
        </div>
      `;
      rulesContent.appendChild(div);
    });

    // Switch section on sidebar click
    sidebarNav.addEventListener('click', e => {
      const link = e.target.closest('a[data-id]');
      if (!link) return;
      e.preventDefault();
      const id = link.dataset.id;

      document.querySelectorAll('.sidebar-nav a').forEach(a => a.classList.remove('active'));
      document.querySelectorAll('.rules-section').forEach(s => s.classList.remove('active'));
      link.classList.add('active');
      document.getElementById(`section-${id}`).classList.add('active');

      if (!cache[id]) loadSection(id);
    });

    // Fetch a pre-built HTML fragment
    async function loadSection(id) {
      const sec = CONFIG.sections.find(s => s.id === id);
      const container = document.getElementById(`doc-${id}`);
      if (!sec || !container) return;

      try {
        const res = await fetch(sec.file);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const html = await res.text();
        container.innerHTML = html;
        cache[id] = true;
      } catch {
        container.innerHTML = `
          <div class="doc-error">
            <span>Not yet configured</span> — add the Google Doc ID to config.json,
            then run the fetch workflow. See README for setup.
          </div>`;
      }
    }

    // Load first section
    loadSection(CONFIG.sections[0].id);
  })();
</script>
</body>
</html>
